services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roadforge}
      POSTGRES_USER: ${POSTGRES_USER:-roadforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadforge_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadforge} -d ${POSTGRES_DB:-roadforge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "7878:7878"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadforge}:${POSTGRES_PASSWORD:-roadforge_dev}@postgres:5432/${POSTGRES_DB:-roadforge}
      ROADFORGE_ENVIRONMENT: ${ROADFORGE_ENVIRONMENT:-development}
      ROADFORGE_WEB_BASE_URL: ${ROADFORGE_WEB_BASE_URL:-http://localhost:3020}
      ROADFORGE_CORS_ORIGINS: ${ROADFORGE_CORS_ORIGINS:-http://localhost:3020,http://127.0.0.1:3020}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
