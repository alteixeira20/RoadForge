name: Bug report
description: Report reproducible RoadForge behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include invite links, tokens, passwords, private roadmap data, or vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, deployment mode, and commit/version.
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: This report does not contain a security vulnerability.
          required: true
