name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run validation gate
        run: make check

  api-lint:
    name: API Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API with dev extras
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run ruff
        working-directory: apps/api
        run: ruff check src/

  api-syntax:
    name: API Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python sources
        run: python -m compileall -q apps/api/src

  migration-check:
    name: Migration / Schema Drift
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: roadforge
          POSTGRES_PASSWORD: roadforge
          POSTGRES_DB: roadforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roadforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e .

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://roadforge:roadforge@localhost:5432/roadforge
        run: alembic upgrade head

      - name: Check for ORM/migration drift
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://roadforge:roadforge@localhost:5432/roadforge
        run: alembic check

  api-test:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: roadforge
          POSTGRES_PASSWORD: roadforge
          POSTGRES_DB: roadforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roadforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API with test extras
        working-directory: apps/api
        run: pip install -e ".[test]"

      - name: Run pytest
        working-directory: apps/api
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://roadforge:roadforge@localhost:5432/roadforge_test
        run: pytest tests/ -v

  js-audit:
    name: JS Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run JS audit (high+ severity)
        run: pnpm audit --audit-level high --prod

  api-audit:
    name: API Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API with audit extras
        run: pip install -e "apps/api[audit]" -q

      - name: Run Python audit
        run: make api-audit

  web-unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/web test
