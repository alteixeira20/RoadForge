log_format roadforge_safe '$remote_addr - $remote_user [$time_local] '
                          '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                          '"$http_user_agent"';

server {
    listen 80;
    server_name roadforge.alexandreteixeira.dev;

    # Invite tokens and SSE tickets are URL credentials. Do not log query
    # strings or Referer values, either of which can contain those credentials.
    access_log /var/log/nginx/roadforge.access.log roadforge_safe;

    client_max_body_size 512k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # The production API disables OpenAPI and interactive documentation.
    location = /api/docs { return 404; }
    location = /api/redoc { return 404; }
    location = /api/openapi.json { return 404; }

    location ~ ^/api/roadmaps/[^/]+/events$ {
        proxy_pass http://roadforge-api:7878;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://roadforge-api:7878;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://roadforge-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
